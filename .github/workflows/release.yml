name: Release

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write

jobs:
  build:
    name: Build - ${{ matrix.os }}
    runs-on: ${{ matrix.os }}
    timeout-minutes: 90
    strategy:
      fail-fast: true
      matrix:
        include:
          - os: macos-14
            arch: arm64
            platform: darwin-arm64
            archive_ext: tar.gz
          - os: ubuntu-latest
            arch: x64
            platform: linux-x86_64
            archive_ext: tar.gz
          - os: windows-latest
            arch: x64
            platform: windows-x86_64
            archive_ext: zip

    steps:
      - uses: actions/checkout@v4

      - uses: julia-actions/setup-julia@v2
        with:
          version: '1.12'
          arch: ${{ matrix.arch }}

      - uses: julia-actions/cache@v2

      - name: Install dependencies
        run: |
          julia --project -e '
            using Pkg
            Pkg.rm("MacroEconometricModels")
            Pkg.add(url="https://github.com/FriedmanJP/MacroEconometricModels.jl.git", rev="main")
            Pkg.instantiate()
          '

      - name: Build sysimage
        run: julia build_release.jl
        timeout-minutes: 60

      - name: Get version
        id: version
        shell: bash
        run: echo "version=${GITHUB_REF_NAME#v}" >> "$GITHUB_OUTPUT"

      - name: Archive (tar.gz)
        if: matrix.archive_ext == 'tar.gz'
        shell: bash
        run: |
          cd build
          tar -czf friedman-v${{ steps.version.outputs.version }}-${{ matrix.platform }}.tar.gz friedman/

      - name: Archive (zip)
        if: matrix.archive_ext == 'zip'
        shell: pwsh
        run: |
          cd build
          Compress-Archive -Path friedman -DestinationPath "friedman-v${{ steps.version.outputs.version }}-${{ matrix.platform }}.zip"

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: friedman-${{ matrix.platform }}
          path: build/friedman-v${{ steps.version.outputs.version }}-${{ matrix.platform }}.${{ matrix.archive_ext }}

  release:
    name: Create Release
    needs: build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts
          merge-multiple: true

      - name: List artifacts
        run: ls -la artifacts/

      - name: Generate checksums
        run: |
          cd artifacts
          sha256sum * > checksums.sha256
          cat checksums.sha256

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          generate_release_notes: true
          files: |
            artifacts/*
            install.sh
            install.ps1
